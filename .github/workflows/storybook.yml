name: Storybook
on:
  push:
    branches:
      - master
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2
        with:
          persist-credentials: false
      - name: Install and Build 🔧
        run: | 
          npm ci
          npm run storybook-build -w packages/fe
      - name: Deploy 🚀
        uses: apetree100122/github-pages-deploy-action@3.6.2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: docs 
          FOLDER: packages/fe/storybook-static.
          CLEAN: true 
          TARGET_FOLDER: docs 
          
# Install npm packages and build the Storybook files
# https://dev.to/kouts/deploy-storybook-to-github-pages-3bij
# The branch the action should deploy to.
# The folder that the build-storybook script generates files
# Automatically remove deleted files from the deploy branch
# The folder that we serve our Storybook files from


